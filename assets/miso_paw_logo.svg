  <rect width="1024" height="1024" fill="#FAF8F2"/>

  <!-- Paw toes -->
  <ellipse cx="318" cy="352" rx="52" ry="74" transform="rotate(-22 318 352)" fill="#2D5E4E"/>
  <ellipse cx="443" cy="282" rx="58" ry="83" transform="rotate(-7 443 282)" fill="#2D5E4E"/>
  <ellipse cx="581" cy="282" rx="58" ry="83" transform="rotate(7 581 282)" fill="#2D5E4E"/>
  <ellipse cx="706" cy="352" rx="52" ry="74" transform="rotate(22 706 352)" fill="#2D5E4E"/>

  <!-- Main paw pad -->
  <path d="M512 424
