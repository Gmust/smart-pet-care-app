name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      summary: ${{ steps.run_gemini.outputs.summary }}
    steps:
      - name: Check out PR merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Gemini review
        id: run_gemini
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-2.5-flash
          prompt: |
            Read `.github/gemini/pr-review-prompt.md` and follow it exactly.

            Pull request context:
            - Repository: ${{ github.repository }}
            - PR number: ${{ github.event.pull_request.number }}
            - Base SHA: ${{ github.event.pull_request.base.sha }}
            - Head SHA: ${{ github.event.pull_request.head.sha }}
            - Title: ${{ github.event.pull_request.title }}
            - Body:
              ${{ github.event.pull_request.body }}

            Review only the diff introduced by this PR.
            Use `git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}` and relevant file reads as needed.
  post-review:
    needs: review
    if: needs.review.outputs.summary != ''
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Upsert PR review comment
        uses: actions/github-script@v7
        env:
          GEMINI_REVIEW_BODY: ${{ needs.review.outputs.summary }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = process.env.GEMINI_REVIEW_BODY;
            const issue_number = context.payload.pull_request.number;
            const marker = '## Gemini PR Review';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
