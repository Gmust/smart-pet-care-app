name: Compass Manifest

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

jobs:
  manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Generate manifest
        env:
          AI_PROVIDER: claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx compass-sync@1.0.0 manifest --local

      - name: Commit manifest
        run: |
          if [ -z "$(git status --short compass-manifest.json)" ]; then
            echo "Manifest unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add compass-manifest.json
          git commit -m "chore: update compass manifest [skip ci]"
          git push
