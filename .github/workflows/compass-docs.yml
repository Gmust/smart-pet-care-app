name: Compass Docs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  docs:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out PR head branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Pre-fetch base
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Update docs with Compass
        env:
          AI_PROVIDER: claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx compass-sync@1.0.0 docs \
            --base ${{ github.event.pull_request.base.sha }} \
            --head ${{ github.event.pull_request.head.sha }}

      - name: Commit documentation changes
        run: |
          if [ -z "$(git status --short)" ]; then
            echo "No documentation changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs README.md CLAUDE.md AGENTS.md .github
          if git diff --cached --quiet; then
            echo "No staged documentation changes."
            exit 0
          fi
          git commit -m "docs: update via Compass [skip ci]"
          git push
