name: Gemini Docs Update

on:
  pull_request:
    types: [labeled, synchronize, reopened, ready_for_review]

jobs:
  update-docs:
    if: github.event.pull_request.head.repo.full_name == github.repository && contains(github.event.pull_request.labels.*.name, 'gemini:docs')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out PR head branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Gemini docs update
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-2.5-flash
          prompt: |
            Read `.github/gemini/docs-update-prompt.md` and follow it exactly.

            Pull request context:
            - Repository: ${{ github.repository }}
            - PR number: ${{ github.event.pull_request.number }}
            - Base SHA: ${{ github.event.pull_request.base.sha }}
            - Head SHA: ${{ github.event.pull_request.head.sha }}
            - Title: ${{ github.event.pull_request.title }}
            - Body:
              ${{ github.event.pull_request.body }}

            Update documentation so it matches this PR.
            Review only the diff introduced by this PR using:
            `git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}`

      - name: Commit documentation changes
        run: |
          if [ -z "$(git status --short)" ]; then
            echo "No documentation changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs README.md GEMINI.md .github .gitignore

          if git diff --cached --quiet; then
            echo "No staged documentation changes to commit."
            exit 0
          fi

          git commit -m "docs: update PR documentation via Gemini"
          git push

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## Gemini Docs Update',
                '',
                'Gemini updated the documentation for this PR and pushed the changes to the PR branch.',
                'If no commit was added, Gemini did not find a documentation change worth making.',
              ].join('\n'),
            });
